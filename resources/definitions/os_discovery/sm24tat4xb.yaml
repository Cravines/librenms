mib: SM24TAT4XB-MIB
modules:
    os:
        hardware: SM24TAT4XB-MIB::sm24tat4xbSystemInfoModelName.0
        serial: SM24TAT4XB-MIB::sm24tat4xbSystemInfoSeriesNumber.0
        version: SM24TAT4XB-MIB::sm24tat4xbSystemInfoFirmwareVersion.0

    sensors:
        temperature:
            data:
                -
                    oid: sm24tat4xbTemperature1
                    value: sm24tat4xbTemperature1Celsius
                    num_oid: '.1.3.6.1.4.1.868.2.77.2.1.13.1.1.{{ $index }}'
                    low_limit: 0
                    high_limit: 100
                    descr: "Temperature 1"
                    index: 'sm24tat4xbTemperature1CelsiusValue.{{ $index }}'
                -
                    oid: sm24tat4xbTemperature2
                    value: sm24tat4xbTemperature2Celsius
                    num_oid: '.1.3.6.1.4.1.868.2.77.2.1.13.2.1.{{ $index }}'
                    low_limit: 0
                    high_limit: 100
                    descr: "Temperature 2"
                    index: 'sm24tat4xbTemperature2CelsiusValue.{{ $index }}'
        power:
            options:
                skip_value_lt: 3
            data:
                -
                    oid: sm24tat4xbPoeStatusTable
                    value: sm24tat4xbPoeStatusPowerUsed
                    num_oid: '.1.3.6.1.4.1.868.2.77.2.2.13.1.1.1.5.{{ $index }}'
                    index: 'sm24tat4xbPoeStatusPowerUsed.{{ $index }}'
                    descr: "Port {{ $index }}"
