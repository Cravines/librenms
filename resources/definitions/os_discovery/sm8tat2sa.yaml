mib: SM8TAT2SA-MIB
modules:
    os:
        hardware: SM8TAT2SA-MIB::sm8tat2saSystemInfoModelName.0
        serial: SM8TAT2SA-MIB::sm8tat2saSystemInfoSeriesNumber.0
        version: SM8TAT2SA-MIB::sm8tat2saSystemInfoFirmwareVersion.0
    sensors:
        power:
            options:
                skip_value_lt: 3
            data:
                -
                    oid: sm8tat2saPoeStatusTable
                    value: sm8tat2saPoeStatusPowerUsed
                    num_oid: '.1.3.6.1.4.1.868.2.71.2.13.2.1.1.3.{{ $index }}'
                    index: 'sm8tat2saPoeStatusPowerUsed.{{ $index }}'
                    descr: "Port {{ $index }}"
