mib: SM24TAT2SA-MIB
modules:
    os:
        hardware: SM24TAT2SA-MIB::sm24tat2saSystemInfoModelName.0
        serial: SM24TAT2SA-MIB::sm24tat2saSystemInfoSeriesNumber.0
        version: SM24TAT2SA-MIB::sm24tat2saSystemInfoFirmwareVersion.0
    sensors:
        power:
            options:
                skip_value_lt: 3
            data:
                -
                    oid: sm24tat2saPoeStatusTable
                    value: sm24tat2saPoeStatusPowerUsed
                    num_oid: '.1.3.6.1.4.1.868.2.73.2.13.2.1.1.3.{{ $index }}'
                    index: 'sm24tat2saPoeStatusPowerUsed.{{ $index }}'
                    descr: "Port {{ $index }}"
